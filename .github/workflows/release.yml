name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows-release:
    name: Build and publish Windows installer
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Use current repository for electron-builder publishing
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const pkgPath = "package.json";
          const pkg = JSON.parse(fs.readFileSync(pkgPath, "utf8"));
          const [owner, repo] = process.env.GITHUB_REPOSITORY.split("/");
          pkg.build.publish = [
            {
              provider: "github",
              owner,
              repo,
              releaseType: "release"
            }
          ];
          fs.writeFileSync(pkgPath, `${JSON.stringify(pkg, null, 2)}\n`);
          NODE

      - name: Build NSIS installer and publish to GitHub Releases
        run: npm run build -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: GeekAgent-Windows-${{ github.ref_name }}
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/*.yml
          if-no-files-found: ignore
